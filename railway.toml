# Deploy from monorepo root. Railway uses ./Dockerfile when present.
# Alternative: set service Root Directory to `server` and use /server/railway.toml.
[build]
dockerfilePath = "Dockerfile"
watchPatterns = ["server/**"]

[deploy]
startCommand = "python server/run.py"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
